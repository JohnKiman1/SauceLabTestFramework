name: Load Tests (K6)

on:
  schedule:
    - cron: "0 2 * * *"  # Daily at 2 AM
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CI: true

jobs:
  load-test:
    name: 🏋️ Run K6 Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install K6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: 📁 Create report directories
        run: |
          mkdir -p reports/load/json
          mkdir -p reports/load/html

      - name: 🏃 Run Smoke Test
        run: |
          k6 run src/load/scenarios/browser-smoke-test.js --out json=reports/load/json/smoke-report.json

      - name: 🏃 Run Load Test
        run: |
          k6 run src/load/scenarios/browser-load-test.js --out json=reports/load/json/load-report.json

      - name: 🏃 Run Spike Test
        if: false  # Optional - enable if you have spike test
        run: |
          k6 run src/load/scenarios/browser-spike-test.js --out json=reports/load/json/spike-report.json

      - name: 📊 Generate HTML Reports
        run: |
          node src/load/utils/convert-k6-to-html.js

      - name: 📤 Upload Load Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: load-test-reports
          path: reports/load/
          retention-days: 30

      - name: 📝 Create Summary
        run: |
          echo "# 🏋️ Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Smoke Test: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Load Test: Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 **Download reports:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY