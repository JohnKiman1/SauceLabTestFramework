name: Load Tests (K6)

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main, develop ]
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CI: true

jobs:
  load-test:
    name: 🏋️ Run K6 Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install K6
        run: |
          # Use the official K6 installer script
          curl -s https://k6.io/install.sh | sudo bash
          k6 --version

      - name: 📁 Create report directories
        run: |
          mkdir -p reports/load/json
          mkdir -p reports/load/html

      - name: 🏃 Run CI Smoke Test (HTTP)
        run: |
          k6 run src/load/scenarios/ci-smoke-test.js --out json=reports/load/json/smoke-report.json

      - name: 📊 Generate HTML Reports
        run: |
          node src/load/utils/convert-k6-to-html.js

      - name: 📤 Upload Load Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: load-test-reports
          path: reports/load/
          retention-days: 30

      - name: 📝 Create Summary
        run: |
          echo "# 🏋️ Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ CI Smoke Test: Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 **Download reports:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY