name: Playwright Test Platform (Enterprise Mode)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CI: true
  BASE_URL: https://www.saucedemo.com

jobs:

# ==========================================
# AUTH JOB - Generate Session Once
# ==========================================
  auth:
    name: 🔐 Generate Auth State
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install dependencies
        run: npm install

      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🔑 Generate auth state
        run: npx playwright test --project=chromium --grep '@smoke' --workers=1

      - name: 📤 Upload auth state
        uses: actions/upload-artifact@v4
        with:
          name: auth-state
          path: reports/auth/
          retention-days: 1


# ==========================================
# TEST JOB - Parallel Sharded Execution
# ==========================================
  test:
    name: 🧪 Test Farm Shard ${{ matrix.shard }}/${{ strategy.job-total }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: auth

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install dependencies
        run: npm install

      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 📥 Download auth state
        uses: actions/download-artifact@v4
        with:
          name: auth-state
          path: reports/auth/

      - name: 📁 Create allure results directory
        run: mkdir -p allure-results

      - name: 🧪 Run tests (Shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }} --workers=1
        continue-on-error: true

      - name: 📤 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results
          retention-days: 5

      - name: 📤 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shard }}
          path: reports/ui/test-results/
          retention-days: 5


# ==========================================
# ALLURE REPORT - Aggregation
# ==========================================
  allure-report:
    name: 📊 Allure Report Aggregation
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📦 Install dependencies
        run: npm install

      - name: 📥 Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: 📊 Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: 📤 Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# DEPLOY - GitHub Pages
# ==========================================
  deploy:
    name: 🚀 Deploy Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: allure-report
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


# ==========================================
# NOTIFICATION
# ==========================================
  notify:
    name: 📨 Send Notification
    runs-on: ubuntu-latest
    needs: [test, allure-report, deploy]
    if: always()

    steps:
      - name: 📊 Check test status
        run: |
          echo "✅ Tests completed!"
          echo "📊 Allure Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "🔗 GitHub Actions: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"