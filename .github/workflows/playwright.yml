name: Playwright Test Platform

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main, develop ]
  schedule:
    - cron: "0 0 * * 1"  # ✅ Every 10 minutes

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CI: true
  BASE_URL: https://www.saucedemo.com
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/cache/ms-playwright

jobs:

# ==========================================
# AUTH JOB - Generate Session Once
# ==========================================
  auth:
    name: 🔐 Generate Auth State
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: 💾 Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🌐 Install Playwright browsers
        run: pnpm run install:playwright

      - name: 🔑 Generate auth state
        run: pnpm run ci:auth

      - name: 📤 Upload auth state
        uses: actions/upload-artifact@v4
        with:
          name: auth-state
          path: reports/auth/
          retention-days: 1


# ==========================================
# TEST JOB - Parallel Sharded Execution
# ==========================================
  test:
    name: 🧪 Test Farm Shard ${{ matrix.shard }}/${{ strategy.job-total }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: auth

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: 💾 Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🌐 Install Playwright browsers
        run: pnpm run install:playwright

      - name: 📥 Download auth state
        uses: actions/download-artifact@v4
        with:
          name: auth-state
          path: reports/auth/

      - name: 📁 Create report directories
        run: |
          mkdir -p reports/ui/allure-results
          mkdir -p reports/ui/test-results
      - name: 🧪 Run tests (Shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: pnpm run test:ci -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        continue-on-error: true

      - name: 📤 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: reports/ui/allure-results
          retention-days: 5

      - name: 📤 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shard }}
          path: reports/ui/test-results/
          retention-days: 5


# ==========================================
# ALLURE REPORT - Aggregation
# ==========================================
  allure-report:
    name: 📊 Allure Report Aggregation
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📊 Install Allure CLI
        run: |
          npm install -g allure-commandline
          allure --version
      - name: 📥 Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: reports/ui/allure-results
          merge-multiple: true

      - name: 📋 List Allure results
        run: |
          echo "Files in reports/ui/allure-results:"
          ls -la reports/ui/allure-results/ || echo "Directory not found!"
          echo "Number of files: $(ls -1 reports/ui/allure-results/ 2>/dev/null | wc -l)"
      - name: 📊 Generate Allure report
        run: |
          allure generate reports/ui/allure-results --clean -o allure-report
          echo "Report generated successfully!"
      - name: 📋 List report contents
        run: |
          echo "Files in allure-report:"
          ls -la allure-report/
          echo "Number of files in report: $(ls -1 allure-report/ 2>/dev/null | wc -l)"
      - name: 📤 Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report


# ==========================================
# DEPLOY - GitHub Pages
# ==========================================
  deploy:
    name: 🚀 Deploy Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: allure-report
    # ✅ Deploy from BOTH main AND develop branches
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: 📥 Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Display Report URL
        run: |
          echo "=========================================="
          echo "✅ Allure Report Deployed Successfully!"
          echo "📊 View Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "=========================================="
      - name: 📝 Create Summary
        run: |
          echo "# 🚀 Allure Report Deployed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 View Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed" >> $GITHUB_STEP_SUMMARY
# ==========================================
# NOTIFICATION
# ==========================================
  notify:
    name: 📨 Send Notification
    runs-on: ubuntu-latest
    needs: [test, allure-report]
    if: always()

    steps:
      - name: 📊 Check test status
        run: |
          echo "=========================================="
          echo "✅ Tests completed!"
          echo "📊 Allure Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "🔗 GitHub Actions: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "📝 Event: ${{ github.event_name }}"
          echo "=========================================="